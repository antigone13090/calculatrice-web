<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculatrice Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="calculator-card" aria-label="Calculatrice">
      <header class="calculator-header">
        <div>
          <p class="eyebrow">Calculatrice Web</p>
          <h1>Calculatrice</h1>
        </div>
        <p class="keyboard-hint">Clavier pris en charge</p>
      </header>

      <section class="display-panel" aria-live="polite">
        <p id="operationDisplay" class="operation-display">0</p>
        <p id="resultDisplay" class="result-display">0</p>
      </section>

      <section class="keypad" aria-label="Touches de calcul">
        <button type="button" class="key key-action" data-action="clear">C</button>
        <button type="button" class="key key-action" data-action="delete">DEL</button>
        <button type="button" class="key key-operator" data-value="%">%</button>
        <button type="button" class="key key-operator" data-value="/">÷</button>

        <button type="button" class="key" data-value="7">7</button>
        <button type="button" class="key" data-value="8">8</button>
        <button type="button" class="key" data-value="9">9</button>
        <button type="button" class="key key-operator" data-value="*">×</button>

        <button type="button" class="key" data-value="4">4</button>
        <button type="button" class="key" data-value="5">5</button>
        <button type="button" class="key" data-value="6">6</button>
        <button type="button" class="key key-operator" data-value="-">−</button>

        <button type="button" class="key" data-value="1">1</button>
        <button type="button" class="key" data-value="2">2</button>
        <button type="button" class="key" data-value="3">3</button>
        <button type="button" class="key key-operator" data-value="+">+</button>

        <button type="button" class="key key-zero" data-value="0">0</button>
        <button type="button" class="key" data-value=".">.</button>
        <button type="button" class="key key-equals" data-action="equals">=</button>
      </section>
    </section>

    <aside class="history-card" aria-label="Historique des calculs">
      <div class="history-header">
        <div>
          <p class="eyebrow">Historique</p>
          <h2>10 derniers calculs</h2>
        </div>
        <button type="button" id="clearHistoryButton" class="history-clear-button">Effacer</button>
      </div>
      <ul id="historyList" class="history-list">
        <li class="history-empty">Aucun calcul pour le moment.</li>
      </ul>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
